<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C5XC4KSB7N"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-C5XC4KSB7N');
    </script>
    

    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=../apartments.html">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .message {
            text-align: center;
            color: #1a5f7a;
        }
    </style>
</head>
<body>
    <div class="message">
        <h1>Redirecting to Apartments...</h1>
        <p>If you are not redirected automatically, <a href="../apartments.html">click here</a>.</p>
    </div>
    <!-- Cookie Consent Banner -->
    <div id="cookieBanner" style="display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(26, 95, 122, 0.98); color: white; padding: 1.25rem 1.5rem; box-shadow: 0 -4px 20px rgba(0,0,0,0.3); z-index: 10000; font-family: 'Inter', sans-serif; backdrop-filter: blur(10px);">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; flex-wrap: wrap;">
            <p style="margin: 0; flex: 1; min-width: 250px; font-size: 0.95rem; line-height: 1.5;">
                🍪 We use cookies to analyze site traffic and improve your experience. Your data is never sold or shared.
            </p>
            <div style="display: flex; gap: 0.75rem; flex-shrink: 0;">
                <button onclick="acceptCookies()" style="padding: 0.65rem 1.75rem; background: white; color: #1a5f7a; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 0.95rem; transition: all 0.2s; font-family: 'Inter', sans-serif;">
                    Accept
                </button>
                <button onclick="rejectCookies()" style="padding: 0.65rem 1.75rem; background: transparent; color: white; border: 2px solid white; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 0.95rem; transition: all 0.2s; font-family: 'Inter', sans-serif;">
                    Reject
                </button>
            </div>
        </div>
    </div>

    <script>
        // Check if user already made a choice
        const cookieConsent = localStorage.getItem('cookieConsent');
        
        if (!cookieConsent) {
            // Show banner if no choice was made
            document.getElementById('cookieBanner').style.display = 'block';
        } else if (cookieConsent === 'rejected') {
            // Disable GA4 if previously rejected
            window['ga-disable-G-C5XC4KSB7N'] = true;
        }

        function acceptCookies() {
            localStorage.setItem('cookieConsent', 'accepted');
            document.getElementById('cookieBanner').style.display = 'none';
            // GA4 already loaded, no action needed
        }

        function rejectCookies() {
            localStorage.setItem('cookieConsent', 'rejected');
            document.getElementById('cookieBanner').style.display = 'none';
            // Disable GA4
            window['ga-disable-G-C5XC4KSB7N'] = true;
        }
    </script>

</body>
</html>
